<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Restaurante 501</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1810 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-logo { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
        .login-title { text-align: center; font-weight: 700; color: #1a1a1a; margin-bottom: 0.2rem; }
        .login-subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .btn-login {
            background: #b5451b;
            border: none;
            color: #fff;
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #8a3214; color: #fff; }
        .form-control:focus { border-color: #b5451b; box-shadow: 0 0 0 3px rgba(181,69,27,0.15); }
        label { font-weight: 600; font-size: 0.9rem; color: #444; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">🍽️</div>
        <h4 class="login-title">Restaurante 501</h4>
        <p class="login-subtitle">Iniciá sesión para continuar</p>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger py-2 mb-3" style="font-size:0.9rem">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
