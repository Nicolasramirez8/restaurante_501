{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px; margin:0 auto;">
    <h2>👥 {{ titulo }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" name="nombre" value="{{ objeto.nombre }}" required>
        </div>
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" name="correo" value="{{ objeto.correo }}">
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono" value="{{ objeto.telefono }}">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button type="submit" class="btn btn-primary">💾 Guardar</button>
            <a href="{% url 'clientes_lista' %}" class="btn btn-danger">❌ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
