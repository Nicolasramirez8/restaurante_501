{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px; margin:0 auto;">
    <h2>🍽️ {{ titulo }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre del plato</label>
            <input type="text" name="nombre_plato" value="{{ objeto.nombre_plato }}" required>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" rows="3" style="width:100%; padding:12px; border:2px solid #e9ecef; border-radius:10px; font-size:16px;">{{ objeto.descripcion }}</textarea>
        </div>
        <div class="form-group">
            <label>Precio</label>
            <input type="number" name="precio" value="{{ objeto.precio }}" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <input type="text" name="categoria" value="{{ objeto.categoria }}">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="disponible" {% if objeto.disponible %}checked{% endif %}> Disponible
            </label>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button type="submit" class="btn btn-primary">💾 Guardar</button>
            <a href="{% url 'platos_lista' %}" class="btn btn-danger">❌ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
